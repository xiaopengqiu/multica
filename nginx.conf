user admin;
worker_processes 1;
error_log /tmp/nginx-error.log;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /home/admin/multica/mime.types;
    default_type application/octet-stream;
    access_log /tmp/nginx-access.log;
    sendfile on;
    keepalive_timeout 65;

    # Default proxy temp path (/var/lib/aa_nginx/tmp/proxy/) is not writable
    # by the admin user running worker processes, causing intermittent 502s
    # on larger API responses. Point it at an admin-owned tmp dir.
    proxy_temp_path /tmp/nginx-proxy-temp;

    # Path to static assets from Next.js build
    upstream nextjs {
        server 127.0.0.1:3000;
    }

    upstream backend {
        server 127.0.0.1:8080;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name 47.102.103.66;

        # Static files from Next.js public directory
        location /images/ {
            alias /home/admin/multica/apps/web/public/images/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /favicon.svg {
            alias /home/admin/multica/apps/web/public/favicon.svg;
            expires 30d;
        }

        # Next.js static assets
        location /_next/static/ {
            alias /home/admin/multica/apps/web/.next/static/;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other requests go to Next.js
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
